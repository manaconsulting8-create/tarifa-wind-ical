<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tarifa Wind — Abonnement calendrier</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      line-height: 1.5;
    }
    body {
      max-width: 42rem;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .url-box {
      display: flex;
      gap: 0.5rem;
      margin: 1rem 0;
    }
    input[type="text"] {
      flex: 1;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.9rem;
      padding: 0.6rem 0.75rem;
      border: 1px solid #ccc;
      border-radius: 0.375rem;
    }
    button {
      padding: 0.6rem 1rem;
      border: 1px solid #ccc;
      border-radius: 0.375rem;
      background: #f5f5f5;
      cursor: pointer;
    }
    button:hover { background: #ebebeb; }
  </style>
</head>
<body>
  <h1>Tarifa Wind iCal</h1>
  <p>Prévisions de vent pour Tarifa (Open-Meteo). Le calendrier est mis à jour toutes les heures.</p>

  <h2>URL d'abonnement</h2>
  <p>Copiez cette URL dans Google Calendar, Apple Calendar ou Outlook&nbsp;:</p>
  <div class="url-box">
    <input type="text" id="sub-url" readonly aria-label="URL d'abonnement au calendrier">
    <button type="button" id="copy-btn">Copier</button>
  </div>
  <p id="copy-status" hidden>URL copiée.</p>

  <script>
    const feedUrl = new URL("tarifa-wind.ics", window.location.href).href;
    const input = document.getElementById("sub-url");
    input.value = feedUrl;

    document.getElementById("copy-btn").addEventListener("click", async () => {
      input.select();
      input.setSelectionRange(0, feedUrl.length);
      try {
        await navigator.clipboard.writeText(feedUrl);
      } catch {
        document.execCommand("copy");
      }
      const status = document.getElementById("copy-status");
      status.hidden = false;
      setTimeout(() => { status.hidden = true; }, 2000);
    });
  </script>
</body>
</html>
